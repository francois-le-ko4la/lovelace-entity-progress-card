name: 🐞 Bug Report
description: Create a report to help us improve
title: "[Bug]: <title>"
labels: ["bug"]
body:
    - type: checkboxes
      attributes:
          label: Requirements
          options:
              - label: I checked the README.
                required: true
              - label: I have updated entity-progress-card to the latest available version.
                required: true
              - label: I did a search to see if there is a similar issue.
                required: true
    - type: textarea
      attributes:
          label: Current Behavior
          description: A concise description of what you're experiencing.
      validations:
          required: true
    - type: textarea
      attributes:
          label: Expected Behavior
          description: A concise description of what you expected to happen.
      validations:
          required: false
    - type: textarea
      attributes:
          label: Steps To Reproduce
          description: Steps to reproduce the behavior.
          placeholder: |
              1. In this environment...
              2. With this config...
              3. Run '...'
              4. See error...
      validations:
          required: true
    - type: textarea
      attributes:
          label: Card Configuration (YAML)
          description: |
              Please paste the card's YAML configuration (as shown in the dashboard's card editor, "Edit in YAML"). This is required to reproduce the issue.
          render: yaml
      validations:
          required: true
    - type: textarea
      attributes:
          label: Context
          description: |
              If your issue is about a certain type of entity, please provide the entity state/attribute. You can find it in the [developer tools](https://my.home-assistant.io/redirect/developer_states/). Otherwise, you can leave this section blank.
          render: yaml
      validations:
          required: false
    - type: textarea
      attributes:
          label: Environment
          description: |
              examples:
                - **Brower**: Chrome 136.0.7103.93
                - **HA Version**: 2024.12.0
                - **Entity Progress Card**: 1.2.3
          value: |
              - Browser:
              - HA Version:
              - Entity Progress Card:
          render: markdown
      validations:
          required: true
    - type: textarea
      attributes:
          label: Anything else?
          description: |
              Links? References? Anything that will give us more context about the issue you are encountering!

              Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    - type: markdown
      attributes:
          value: >
              Thanks for contributing 🎉
