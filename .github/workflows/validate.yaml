name: HACS validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    steps:
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "plugin"

  validate-translations:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Translations sync (JSON ↔ JS ↔ template)
        run: node scripts/translations.js validate
      - name: JS syntax check
        run: node --check entity-progress-card.js
