name: Validate JS

on:
  push:
    paths:
      - "src/**"
      - "eslint.config.mjs"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "src/**"
      - "eslint.config.mjs"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  validate-js:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Syntax, lint and full translations sync (JSON ↔ JS ↔ template)
        run: npm run validate
