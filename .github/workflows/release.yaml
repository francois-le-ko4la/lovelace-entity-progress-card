name: Release Processing
on:
  release:
    types: [published]
jobs:
  build-and-upload:
    name: Minify JS & Upload Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm ci
      - name: Ensure dev mode and debug logging are off
        run: npm run check:release-flags
      - name: Validate before publishing (syntax, lint, translations sync)
        run: npm run validate
      - name: Build (minify)
        run: npm run build
      - name: Sanity-check the minified output
        run: node --check dist/entity-progress-card.js
      - name: Upload to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          file_glob: true
          tag: ${{ github.event.release.tag_name }}
          overwrite: true
